<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus - Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="/static/favicon.png" type="image/png">
</head>

<body class="min-h-screen flex items-center justify-center bg-black font-['Space_Grotesk'] p-4">

    <!-- Bottom right glow 1 -->
    <div class="fixed bottom-0 right-0 w-[500px] h-[700px] bg-[#1A1894] opacity-60 blur-[80px] rotate-[-30deg] translate-x-32 translate-y-32 z-0"></div>

    <!-- Bottom right glow 2 -->
    <div class="fixed bottom-0 right-0 w-[400px] h-[600px] bg-[#A8A5FE] opacity-60 blur-[80px] rotate-[-50deg] translate-x-48 translate-y-48 z-0"></div>

    <!-- Card -->
    <div class="relative z-10 flex flex-col bg-[#1a1a1a] rounded-2xl w-full max-w-[580px] p-8 md:p-10">

        <!-- Logo -->
        <h1 class="text-white text-2xl font-bold">Argus</h1>
        <p class="text-gray-400 text-sm mt-1 mb-8">Your silent API guardian.</p>

        <!-- Heading -->
        <h2 class="text-white text-xl font-semibold mb-6">Update Endpoint</h2>

        <!-- Form -->
        <form method="POST" action="/update/{{ endpoint.id }}" class="flex flex-col">

            <!-- Site Name -->
            <div class="mb-4">
                <label class="block text-white text-sm mb-2">Site Name</label>
                <input type="text" name="name" value="{{ endpoint.name }}"
                    class="block w-full bg-[#2a2a2a] border border-[#3a3a3a] rounded-lg px-4 py-3 text-white outline-none focus:border-[#4B45C6] transition"
                    required>
            </div>

            <!-- Site URL -->
            <div class="mb-6">
                <label class="block text-white text-sm mb-2">Site URL</label>
                <input type="url" name="url" value="{{ endpoint.url }}"
                    class="block w-full bg-[#2a2a2a] border border-[#3a3a3a] rounded-lg px-4 py-3 text-white outline-none focus:border-[#4B45C6] transition"
                    required>
            </div>

            <!-- Update Button -->
            <button type="submit"
                class="w-full bg-[#4B45C6] hover:bg-[#3d38a8] text-white font-semibold py-3 rounded-lg transition duration-300">
                Update
            </button>

        </form>

        <!-- Cancel link -->
        <a href="/dashboard"
            class="w-full text-center text-gray-400 hover:text-white py-3 mt-3 block transition text-sm">
            Cancel
        </a>

    </div>

</body>
</html>
